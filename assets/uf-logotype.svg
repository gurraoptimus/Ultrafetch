<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">UF Logotype Icon</title>
  <desc id="desc">Ultra Fetch UF icon with accent gradient.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="180" height="180" rx="24" fill="#0f172a" stroke="url(#accent)" stroke-width="4"/>
  <path d="M58 76v70q0 18 18 18h20q18 0 18-18V76h-20v66h-16V76z M130 76h56v18h-36v18h30v18h-30v34h-20z" fill="url(#accent)" filter="url(#glow)"/>
  <path d="M58 160h104" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
</svg>
