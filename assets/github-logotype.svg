<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Ultra Fetch Logotype</title>
  <desc id="desc">A modern gradient logotype for Ultra Fetch.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#151f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" rx="32"/>

  <g transform="translate(120 180)">
    <rect x="0" y="0" width="180" height="180" rx="24" fill="#0f172a" stroke="url(#accent)" stroke-width="4"/>
    <path d="M38 56v70q0 18 18 18h20q18 0 18-18V56h-20v66h-16V56z M110 56h56v18h-36v18h30v18h-30v34h-20z" fill="url(#accent)" filter="url(#glow)"/>
    <path d="M38 140h104" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g transform="translate(360 222)">
    <text x="0" y="80" fill="#f8fafc" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="1">ULTRA FETCH</text>
    <rect x="2" y="100" width="800" height="8" rx="4" fill="url(#accent)"/>
    <text x="0" y="156" fill="#93c5fd" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="34" font-weight="500">Modern system info • Fastfetch style</text>
    <text x="0" y="204" fill="#94a3b8" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="24">by Gurraoptimus Development</text>
  </g>
</svg>
